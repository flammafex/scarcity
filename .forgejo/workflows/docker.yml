name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: git.carpocratian.org/sibyl/scarcity

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Forgejo registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login git.carpocratian.org -u ${{ github.actor }} --password-stdin

      - name: Compute tags
        id: tags
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REF="${{ github.ref }}"
          TAGS="${{ env.IMAGE }}:${SHA}"
          if [ "$REF" = "refs/heads/main" ]; then
            TAGS="${TAGS},${{ env.IMAGE }}:latest"
          fi
          if echo "$REF" | grep -q '^refs/tags/v'; then
            VERSION="${REF#refs/tags/v}"
            TAGS="${TAGS},${{ env.IMAGE }}:${VERSION}"
            TAGS="${TAGS},${{ env.IMAGE }}:$(echo "$VERSION" | cut -d. -f1-2)"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          IFS=',' read -ra TAG_LIST <<< "${{ steps.tags.outputs.tags }}"
          TAG_ARGS=""
          for t in "${TAG_LIST[@]}"; do TAG_ARGS="$TAG_ARGS -t $t"; done
          docker build $TAG_ARGS .
          for t in "${TAG_LIST[@]}"; do docker push "$t"; done
